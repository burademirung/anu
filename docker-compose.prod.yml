# Production overrides: use with docker compose -f docker-compose.yml -f docker-compose.prod.yml up
services:
  web:
    depends_on:
      redis:
        condition: service_healthy
    # No postgres dependency — production uses DO Managed Database

  redis:
    ports: []  # internal only in production

  minio:
    ports: []  # internal only in production
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  # Remove dev-only postgres
  postgres:
    profiles: ["dev-only"]
